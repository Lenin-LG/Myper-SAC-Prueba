services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: trabajadores_sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build: 
      context: .
      target: build 
    container_name: trabajadores_api
    volumes:
      - .:/src 
    working_dir: /src/Trabajadores 
    command: dotnet watch run --no-launch-profile 
    depends_on:
      - sqlserver
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Server=sqlserver,1433;Database=TrabajadoresPrueba;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
  web:
    build:
      context: .
      dockerfile: Trabajadores.Web/Dockerfile
    container_name: trabajadores_web
    depends_on:
      - api
    ports:
      - "5050:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
volumes:
  sql_data:
